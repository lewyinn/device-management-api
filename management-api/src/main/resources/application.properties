spring.application.name=management-api
server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:sqlite:file:management-api?mode=memory&cache=shared}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.connection-init-sql=PRAGMA foreign_keys=ON
spring.sql.init.mode=always

springdoc.swagger-ui.path=/api-docs
springdoc.api-docs.path=/openapi.json
