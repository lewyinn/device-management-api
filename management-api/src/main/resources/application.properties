spring.application.name=management-api
spring.config.import=optional:file:.env[.properties]
server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=${DATABASE_DRIVER}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME:1800000}

spring.jpa.hibernate.ddl-auto=${DDL_AUTO}
spring.jpa.database-platform=${DATABASE_DIALECT}
spring.jpa.open-in-view=false

cassandra.contact-points=${CASSANDRA_CONTACT_POINTS:127.0.0.1:9042}
cassandra.local-datacenter=${CASSANDRA_LOCAL_DATACENTER:datacenter1}
cassandra.keyspace=${CASSANDRA_KEYSPACE}

springdoc.swagger-ui.path=/api-docs
springdoc.api-docs.path=/openapi.json
